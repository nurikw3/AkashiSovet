services:
  # --- ВЕБ-ИНТЕРФЕЙС (FASTAPI) ---
  web:
    build: .
    container_name: akashi_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Пароль подтягивается динамически из переменной окружения
      DATABASE_URL: postgresql://akashi:${POSTGRES_PASSWORD}@postgres:5432/akashi
    depends_on:
      postgres:
        condition: service_healthy
    command: uv run uvicorn web.main:app --host 0.0.0.0 --port 8000

  # --- ТЕЛЕГРАМ БОТ ---
  bot:
    build: .
    container_name: akashi_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://akashi:${POSTGRES_PASSWORD}@postgres:5432/akashi
    volumes:
      - data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uv run python -m bot.bot

  # --- БАЗА ДАННЫХ ---
  postgres:
    image: postgres:16-alpine
    container_name: akashi_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: akashi
      POSTGRES_USER: akashi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U akashi -d akashi" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- КЭШ (REDIS) ---
  redis:
    image: redis:7-alpine
    container_name: akashi_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  # --- МОНИТОРИНГ ---
  grafana:
    image: grafana/grafana:latest
    container_name: akashi_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  data:
  pgdata:
  grafana_data:
  redis_data:
