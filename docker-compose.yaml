services:
  web:
    build: .
    image: akashisovet:app
    container_name: akashi_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://akashi:${POSTGRES_PASSWORD}@postgres:5432/akashi
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET_ATTACHMENTS: ${S3_BUCKET_ATTACHMENTS:-attachments}
      S3_BUCKET_PDF: ${S3_BUCKET_PDF:-pdf-documents}
      S3_BUCKET_SIGNATURES: ${S3_BUCKET_SIGNATURES:-signatures}
      WEB_PUBLIC_URL: ${WEB_PUBLIC_URL:-http://localhost:8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    command: uv run uvicorn web.main:app --host 0.0.0.0 --port 8000

  bot:
    image: akashisovet:app
    pull_policy: never
    container_name: akashi_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://akashi:${POSTGRES_PASSWORD}@postgres:5432/akashi
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET_ATTACHMENTS: ${S3_BUCKET_ATTACHMENTS:-attachments}
      S3_BUCKET_PDF: ${S3_BUCKET_PDF:-pdf-documents}
      S3_BUCKET_SIGNATURES: ${S3_BUCKET_SIGNATURES:-signatures}
      WEB_PUBLIC_URL: ${WEB_PUBLIC_URL:-http://localhost:8000}
    volumes:
      - data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    command: uv run python -m bot.bot

  postgres:
    image: postgres:16-alpine
    container_name: akashi_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: akashi
      POSTGRES_USER: akashi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U akashi -d akashi" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: akashi_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: akashi_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: akashi_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_DATASOURCE_PASSWORD: ${GF_DATASOURCE_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro

volumes:
  data:
  pgdata:
  grafana_data:
  redis_data:
  minio_data:
