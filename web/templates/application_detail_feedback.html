<div id="app-detail-feedback">
    {% if app.feedback %}
    <div class="p-4 rounded border border-ak-red/20 bg-ak-red/5">
        <p class="text-[8px] font-mono font-bold tracking-[.15em] uppercase text-ak-red dark:text-ak-red-d mb-2" data-i18n="app.comment">Комментарий</p>
        <p class="text-sm text-ak-red dark:text-ak-red-d whitespace-pre-wrap break-words leading-relaxed">{{ app.feedback }}</p>
    </div>
    {% endif %}
</div>
