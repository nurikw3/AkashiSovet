<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKASHI | Control Center</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        akashi: { red: '#E33A35', dark: '#0C0C0C' }
                    }
                }
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') === 'light') {
                document.documentElement.classList.remove('dark');
            }
        });

        function showRejectForm(id) {
            const actions = document.getElementById('actions-' + id);
            if (actions) actions.classList.add('hidden');
            const form = document.getElementById('reject-form-' + id);
            if (form) form.classList.remove('hidden');
        }

        function hideRejectForm(id) {
            const form = document.getElementById('reject-form-' + id);
            if (form) form.classList.add('hidden');
            const actions = document.getElementById('actions-' + id);
            if (actions) actions.classList.remove('hidden');
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }

        .animate-fade {
            animation: fadeIn 0.35s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .animate-row {
            animation: rowIn 0.25s ease-out forwards;
        }
        @keyframes rowIn {
            from { opacity: 0; transform: translateX(-6px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E33A35; border-radius: 2px; }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        .status-pending  { background: rgba(234,179,8,0.12);  color: #ca8a04; border: 1px solid rgba(234,179,8,0.2); }
        .status-approved { background: rgba(34,197,94,0.1);   color: #16a34a; border: 1px solid rgba(34,197,94,0.2); }
        .status-rework   { background: rgba(227,58,53,0.1);   color: #E33A35; border: 1px solid rgba(227,58,53,0.2); }
        .status-draft    { background: rgba(148,163,184,0.1); color: #94a3b8; border: 1px solid rgba(148,163,184,0.2); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-[#050505] text-gray-900 dark:text-gray-100 min-h-screen">

    <nav class="bg-white/80 dark:bg-akashi-dark/80 backdrop-blur-md border-b border-gray-200 dark:border-white/10 px-8 py-4 flex items-center justify-between sticky top-0 z-50">
        <a href="/" class="flex items-center gap-4 group">
            <div class="w-9 h-9 bg-akashi-red rounded-xl flex items-center justify-center shadow-lg shadow-akashi-red/30 group-hover:rotate-12 transition-transform duration-300">
                <div class="w-2.5 h-2.5 bg-white rounded-full"></div>
            </div>
            <span class="text-xl font-extrabold tracking-tighter uppercase">
                Akashi <span class="font-light text-gray-400 dark:text-gray-500 underline decoration-akashi-red decoration-2 underline-offset-4">Sovet</span>
            </span>
        </a>

        <div class="flex items-center gap-6">
            <button onclick="toggleTheme()" class="p-2.5 rounded-xl bg-gray-100 dark:bg-white/5 hover:scale-110 transition-all">
                <span class="dark:hidden text-lg">🌙</span>
                <span class="hidden dark:inline text-lg">☀️</span>
            </button>
            <a href="/settings" class="text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-akashi-red transition-colors">Settings</a>
            <a href="/settings/template" class="text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-akashi-red transition-colors">Template</a>
            <a href="/meetings" class="text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-akashi-red transition-colors">Meetings</a>
            <a href="/logout" class="text-[10px] font-black uppercase tracking-widest text-red-500/60 hover:text-red-500 transition-colors">Exit</a>
        </div>
    </nav>

    <main class="p-8 max-w-[1500px] mx-auto">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
