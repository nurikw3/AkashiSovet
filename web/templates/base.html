                'th.applicant': 'Applicant',

                'th.actions': 'Actions',

                'count.pending': 'Pending',
                'count.approved': 'Approved',
                'count.rework': 'Rework',

                'meeting.no_past': 'No past meetings yet',
                'meeting.created': '✓ Meeting created',
                'meeting.deleted': '✓ Meeting deleted',
                'meeting.open': 'Open →',
                'meeting.view': 'View →',
                'meeting.basket': 'Select approved applications and set date',
                'meeting.apps_label': 'applications',
                'meeting.title': 'Meetings',
                'meeting.singular': 'Meeting',
                'meeting.management': 'Management',
                'meeting.save_time': 'Save time',
                'meeting.delete_meeting': 'Delete meeting',

                'settings.hint': 'Use /web in the bot to get your ID and a one-time code.',

                'app.back': '← Back',

                'app.topic': 'Topic',
                'app.created': 'Created',
                'app.comment': 'Comment',
                'app.files_hd': 'Files',

                'app.pdf': 'PDF Report',

                'rework.ph': 'Enter feedback...',
                'rework.approved.ph': 'Reason for returning to rework...',
            }
        };

        function getLang() { return localStorage.getItem('ak_lang') || 'ru'; }

        function confirmRemoveFromMeeting(appId) {
            const t = T[getLang()] || T.ru;
            const raw = t['meeting.remove_confirm'] || '';
            return confirm(raw.replace('#{id}', String(appId)));
        }

        function confirmDeleteMeeting() {
            const t = T[getLang()] || T.ru;
            return confirm(t['meeting.delete_confirm'] || '');
        }

        function applyI18n(root) {
            root = root || document;
            const lang = getLang();
            const t = T[lang] || T.ru;
            root.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (t[key] !== undefined) el.textContent = t[key];
            });
            root.querySelectorAll('[data-i18n-ph]').forEach(el => {
                const key = el.dataset.i18nPh;
                if (t[key] !== undefined) el.placeholder = t[key];
            });
        }

        function setLang(lang) {
            localStorage.setItem('ak_lang', lang);
            document.documentElement.lang = lang;
            applyI18n(document);
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.toggle('lang-active', b.dataset.lang === lang);
            });
        }

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('ak_theme', html.classList.contains('dark') ? 'dark' : 'light');
        }

        /* Reject / Rework form helpers */
        function showRejectForm(id) {
            document.getElementById('actions-' + id)?.classList.add('hidden');
            document.getElementById('reject-form-' + id)?.classList.remove('hidden');
        }
        function hideRejectForm(id) {
            document.getElementById('reject-form-' + id)?.classList.add('hidden');
            document.getElementById('actions-' + id)?.classList.remove('hidden');
        }
        function showReworkApprovedForm(id) {
            document.getElementById('rework-approved-form-' + id)?.classList.remove('hidden');
        }
        function hideReworkApprovedForm(id) {
            document.getElementById('rework-approved-form-' + id)?.classList.add('hidden');
        }

        document.addEventListener('DOMContentLoaded', () => {
            /* Theme */
            const savedTheme = localStorage.getItem('ak_theme');
            if (savedTheme === 'light') document.documentElement.classList.remove('dark');
            else document.documentElement.classList.add('dark');

            /* Language */
            const lang = getLang();
            document.documentElement.lang = lang;
            applyI18n(document);
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.toggle('lang-active', b.dataset.lang === lang);
            });
        });

        /* Re-apply i18n after HTMX swaps */
        document.addEventListener('htmx:afterSettle', e => applyI18n(e.detail.elt));
    </script>

    <style>
        body {
            font-family: 'IBM Plex Sans', system-ui, sans-serif;
        }

        .font-mono,
        [class*="font-mono"] {
            font-family: 'IBM Plex Mono', ui-monospace, monospace;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 3px;
            height: 3px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #C93528;
            border-radius: 2px;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* ── Status badges ── */
        .s-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 2px 9px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-family: 'IBM Plex Mono', monospace;
        }

        .s-pending {
            background: rgba(202, 138, 4, .1);
            color: #b45309;
            border: 1px solid rgba(202, 138, 4, .25);
        }

        .s-approved {
            background: rgba(22, 163, 74, .1);
            color: #15803d;
            border: 1px solid rgba(22, 163, 74, .25);
        }

        .s-rework {
            background: rgba(201, 53, 40, .1);
            color: #C93528;
            border: 1px solid rgba(201, 53, 40, .25);
        }

        .s-draft {
            background: rgba(148, 163, 184, .1);
            color: #64748b;
            border: 1px solid rgba(148, 163, 184, .2);
        }

        .dark .s-pending {
            color: #fbbf24;
            border-color: rgba(251, 191, 36, .2);
        }

        .dark .s-approved {
            color: #4ade80;
            border-color: rgba(74, 222, 128, .2);
        }

        .dark .s-rework {
            color: #E03E38;
            border-color: rgba(224, 62, 56, .2);
        }

        .dark .s-draft {
            color: #94a3b8;
        }

        /* ── Animations ── */
        .anim-fade {
            animation: fadeUp .3s ease forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .anim-row {
            animation: rowIn .2s ease forwards;
        }

        @keyframes rowIn {
            from {
                opacity: 0;
                transform: translateX(-4px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ── Nav link ── */
        .nav-link {
            display: block;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .04em;
            color: #706860;
            text-decoration: none;
            transition: all .15s;
        }

        .nav-link:hover {
            color: #C93528;
            background: rgba(201, 53, 40, .07);
        }

        .dark .nav-link {
            color: #706860;
        }

        .dark .nav-link:hover {
            color: #E03E38;
            background: rgba(224, 62, 56, .08);
        }

        .nav-link.active {
            color: #C93528;
            background: rgba(201, 53, 40, .08);
        }

        .dark .nav-link.active {
            color: #E03E38;
        }

        /* ── Lang toggle ── */
        .lang-btn {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: .08em;
            font-family: 'IBM Plex Mono', monospace;
            padding: 2px 6px;
            border-radius: 2px;
            cursor: pointer;
            color: #a09890;
            background: transparent;
            border: none;
            transition: all .15s;
        }

        .lang-btn:hover {
            color: #C93528;
        }

        .lang-active {
            color: #C93528 !important;
        }

        .dark .lang-active {
            color: #E03E38 !important;
        }

        /* ── Theme toggle ── */
        .theme-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 10px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .04em;
            text-align: left;
            background: transparent;
            color: #a09890;
            transition: all .15s;
        }

        .theme-btn:hover {
            color: #C93528;
            background: rgba(201, 53, 40, .07);
        }

        .dark .theme-btn:hover {
            color: #E03E38;
            background: rgba(224, 62, 56, .08);
        }

        /* ── Table ── */
        .ak-table th {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            font-family: 'IBM Plex Mono', monospace;
            color: #a09890;
            padding: 10px 16px;
            text-align: left;
            border-bottom: 1px solid #DDD8CE;
        }

        .dark .ak-table th {
            border-color: #242424;
        }

        .ak-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #F0EBE3;
        }

        .dark .ak-table td {
            border-bottom: 1px solid #1e1e1e;
        }

        .ak-table tr:last-child td {
            border-bottom: none;
        }

        .ak-table tr:hover td {
            background: rgba(0, 0, 0, .018);
        }

        .dark .ak-table tr:hover td {
            background: rgba(255, 255, 255, .018);
        }

        /* ── Input ── */
        .ak-input {
            width: 100%;
            background: #F7F4EF;
            border: 1px solid #DDD8CE;
            border-radius: 4px;
            padding: 9px 12px;
            font-size: 13px;
            outline: none;
            transition: border-color .15s;
            font-family: 'IBM Plex Sans', sans-serif;
            height: 38px;
        }

        .ak-input:focus {
            border-color: #C93528;
        }

        .dark .ak-input {
            background: #1A1A1A;
            border-color: #303030;
            color: #EDE8DF;
        }

        .dark .ak-input:focus {
            border-color: #E03E38;
        }

        /* ── Button ── */
        .ak-btn-red {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 38px;
            padding: 0 18px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            font-family: 'IBM Plex Mono', monospace;
            background: #C93528;
            color: #fff;
            transition: opacity .15s, transform .1s;
        }

        .ak-btn-red:hover {
            opacity: .9;
        }

        .ak-btn-red:active {
            transform: scale(.98);
        }

        .ak-btn-ghost {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 38px;
            padding: 0 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            font-family: 'IBM Plex Mono', monospace;
            background: transparent;
            border: 1px solid #DDD8CE;
            color: #706860;
            transition: all .15s;
        }

        .ak-btn-ghost:hover {
            border-color: #C93528;
            color: #C93528;
        }

        .dark .ak-btn-ghost {
            border-color: #303030;
            color: #706860;
        }

        .dark .ak-btn-ghost:hover {
            border-color: #E03E38;
            color: #E03E38;
        }
    </style>
</head>

<body class="bg-ak-bg dark:bg-ak-dark text-[#111111] dark:text-[#EDE8DF] h-screen flex overflow-hidden">

    <!-- ═══ SIDEBAR ═══════════════════════════════════════════ -->
    <aside
        class="w-44 shrink-0 h-screen flex flex-col border-r border-[#DDD8CE] dark:border-[#1E1E1E] bg-[#F7F4EF] dark:bg-[#0E0E0E]">

        <!-- Brand -->
        <a href="/" class="flex items-center gap-3 px-4 py-5 border-b border-[#DDD8CE] dark:border-[#1E1E1E] group">
            <img src="/static/favicon.png"
                 width="32" height="32" alt="Akashi" class="shrink-0">
            <div class="leading-tight">
                <p class="text-[11px] font-bold tracking-[.12em] uppercase text-[#111111] dark:text-[#EDE8DF]">AKASHI</p>
                <p class="text-[8px] font-mono tracking-[.15em] uppercase text-[#a09890] mt-0.5">DATA CENTER</p>
            </div>
        </a>

        <!-- Nav -->
        <nav class="flex-1 px-2 py-4 space-y-0.5 overflow-y-auto">
            <p
                class="px-2 mb-2 text-[8px] font-mono font-bold tracking-[.15em] uppercase text-[#b0a8a0] dark:text-[#504840]">
                Menu</p>
            <a href="/" class="nav-link" data-i18n="nav.apps">Заявки</a>
            <a href="/meetings" class="nav-link" data-i18n="nav.meetings">Заседания</a>
            <a href="/settings" class="nav-link" data-i18n="nav.settings">Настройки</a>
            <a href="/settings/template" class="nav-link" data-i18n="nav.template">Шаблон</a>
        </nav>

        <!-- Controls -->
        <div class="px-2 py-3 border-t border-[#DDD8CE] dark:border-[#1E1E1E] space-y-1">
            <!-- Theme -->
            <button class="theme-btn" onclick="toggleTheme()" id="theme-toggle-btn">
                <svg class="w-3 h-3 dark:hidden shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
                <svg class="w-3 h-3 hidden dark:block shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <span data-i18n="nav.theme" class="text-[10px]">Тема</span>
            </button>

            <!-- Language -->
            <div class="flex items-center gap-1 px-2 py-1">
                <span class="text-[8px] font-mono tracking-widest text-[#b0a8a0] mr-1">LANG</span>
                <button class="lang-btn lang-active" data-lang="ru" onclick="setLang('ru')">RU</button>
                <span class="text-[9px] text-[#b0a8a0]">/</span>
                <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
            </div>

            <!-- Logout -->
            <a href="/logout" class="nav-link text-[#C93528] hover:text-[#a52b20] dark:text-[#E03E38]"
                data-i18n="nav.logout">Выход</a>
        </div>
    </aside>

    <!-- ═══ MAIN ════════════════════════════════════════════== -->
    <main class="flex-1 h-screen overflow-y-auto bg-ak-bg dark:bg-ak-dark">
        <div class="px-8 py-7 min-h-full">
            {% block content %}{% endblock %}
        </div>
    </main>

</body>

</html>
