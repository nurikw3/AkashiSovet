<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKASHI | Control Center</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        akashi: { red: '#E33A35', dark: '#0C0C0C' }
                    }
                }
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') === 'light') {
                document.documentElement.classList.remove('dark');
            }
        });

        function showRejectForm(id) {
            const actions = document.getElementById('actions-' + id);
            if (actions) actions.classList.add('hidden');
            const form = document.getElementById('reject-form-' + id);
            if (form) form.classList.remove('hidden');
        }

        function hideRejectForm(id) {
            const form = document.getElementById('reject-form-' + id);
            if (form) form.classList.add('hidden');
            const actions = document.getElementById('actions-' + id);
            if (actions) actions.classList.remove('hidden');
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }

        .animate-fade {
            animation: fadeIn 0.35s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .animate-row {
            animation: rowIn 0.25s ease-out forwards;
        }
        @keyframes rowIn {
            from { opacity: 0; transform: translateX(-6px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E33A35; border-radius: 2px; }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        .status-pending  { background: rgba(234,179,8,0.12);  color: #ca8a04; border: 1px solid rgba(234,179,8,0.2); }
        .status-approved { background: rgba(34,197,94,0.1);   color: #16a34a; border: 1px solid rgba(34,197,94,0.2); }
        .status-rework   { background: rgba(227,58,53,0.1);   color: #E33A35; border: 1px solid rgba(227,58,53,0.2); }
        .status-draft    { background: rgba(148,163,184,0.1); color: #94a3b8; border: 1px solid rgba(148,163,184,0.2); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-[#050505] text-gray-900 dark:text-gray-100 min-h-screen flex">

    <aside
        class="w-[13.5rem] shrink-0 sticky top-0 h-screen z-50 flex flex-col border-r border-gray-200 dark:border-white/10 bg-white/90 dark:bg-akashi-dark/95 backdrop-blur-md py-5 px-3">
        <a href="/" class="flex items-center gap-2.5 px-2 mb-4 group">
            <div class="w-8 h-8 bg-akashi-red rounded-lg flex items-center justify-center shadow-md shadow-akashi-red/25 group-hover:rotate-6 transition-transform shrink-0">
                <div class="w-2 h-2 bg-white rounded-full"></div>
            </div>
            <span class="text-sm font-extrabold tracking-tight uppercase leading-tight">
                Akashi <span class="font-light text-gray-400 dark:text-gray-500">Sovet</span>
            </span>
        </a>

        <button type="button" onclick="toggleTheme()"
                class="mb-3 w-full flex items-center justify-center gap-2 py-2 rounded-lg bg-gray-100 dark:bg-white/5 text-[10px] font-black uppercase tracking-widest text-gray-500 dark:text-gray-400 hover:bg-gray-200/80 dark:hover:bg-white/10 transition-all">
            <span class="dark:hidden text-base leading-none">🌙</span>
            <span class="hidden dark:inline text-base leading-none">☀️</span>
            <span>Theme</span>
        </button>

        <nav class="flex flex-col gap-0.5" aria-label="Основное меню">
            <a href="/settings"
               class="block py-1.5 px-2 rounded-lg text-[10px] font-black uppercase tracking-widest text-gray-500 dark:text-gray-400 hover:text-akashi-red hover:bg-gray-100 dark:hover:bg-white/5 transition-colors">Settings</a>
            <a href="/settings/template"
               class="block py-1.5 px-2 rounded-lg text-[10px] font-black uppercase tracking-widest text-gray-500 dark:text-gray-400 hover:text-akashi-red hover:bg-gray-100 dark:hover:bg-white/5 transition-colors">Template</a>
            <a href="/meetings"
               class="block py-1.5 px-2 rounded-lg text-[10px] font-black uppercase tracking-widest text-gray-500 dark:text-gray-400 hover:text-akashi-red hover:bg-gray-100 dark:hover:bg-white/5 transition-colors">Meetings</a>
            <a href="/logout"
               class="block py-1.5 px-2 rounded-lg text-[10px] font-black uppercase tracking-widest text-red-500/70 hover:text-red-500 hover:bg-red-500/10 transition-colors mt-1">Exit</a>
        </nav>
    </aside>

    <main class="flex-1 min-w-0 min-h-screen overflow-y-auto p-6 sm:p-8 max-w-[1500px]">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
