{% extends "base.html" %}
{% block content %}

<div class="anim-fade max-w-6xl mx-auto">
    {% if request.query_params.get('meeting_err') %}
    <div class="mb-6 px-4 py-3 rounded border border-ak-red/25 bg-ak-red/5 text-ak-red text-[9px] font-mono font-bold tracking-wide">
        {{ request.query_params.get('meeting_err') }}
    </div>
    {% endif %}

    <!-- Counters -->
    <div id="dashboard-counters" hx-get="/partials/counters" hx-trigger="every 30s" hx-swap="innerHTML">
        {% include "dashboard_counters.html" %}
    </div>

    <!-- Table -->
    <div id="dashboard-apps">
        {% include "dashboard_apps.html" %}
    </div>
</div>

{% endblock %}
