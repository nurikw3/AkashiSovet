{% extends "base.html" %}
{% block content %}

<div class="animate-fade">
    {% if request.query_params.get('meeting_err') %}
    <div class="mb-6 px-5 py-4 rounded-2xl bg-akashi-red/10 border border-akashi-red/25 text-akashi-red text-[11px] font-bold">
        {{ request.query_params.get('meeting_err') }}
    </div>
    {% endif %}

    <!-- Счётчики (HTMX автообновление) -->
    <div id="dashboard-counters"
         hx-get="/partials/counters"
         hx-trigger="every 30s"
         hx-swap="innerHTML"
         class="mb-6">
        {% include "dashboard_counters.html" %}
    </div>

    <div id="dashboard-apps">
        {% include "dashboard_apps.html" %}
    </div>
</div>

{% endblock %}
