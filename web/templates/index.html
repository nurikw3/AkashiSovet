{% extends "base.html" %}
{% block content %}
<div class="mb-12 flex flex-col md:flex-row justify-between items-end gap-6 animate-fade">
    <div>
        <h1 class="text-5xl font-black tracking-tighter mb-3 dark:text-white">Applications</h1>
        <div class="flex items-center gap-2">
            <div class="h-1.5 w-12 bg-akashi-red rounded-full"></div>
            <span class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-400">Document Management
                System</span>
        </div>
    </div>

    <div
        class="flex bg-white dark:bg-akashi-dark border border-gray-200 dark:border-white/10 p-1.5 rounded-2xl shadow-sm">
        {% for t in ['active', 'archive', 'all'] %}
        <button hx-get="/?tab={{t}}" hx-target="#table-container" hx-push-url="true"
            class="px-8 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all
                {% if tab == t %}bg-gray-100 dark:bg-white/5 text-akashi-red shadow-inner{% else %}text-gray-400 hover:text-gray-900 dark:hover:text-gray-100{% endif %}">
            {{ 'Active' if t == 'active' else 'Archive' if t == 'Global' else 'All' }}
        </button>
        {% endfor %}
    </div>
</div>

<div
    class="bg-white dark:bg-akashi-dark border border-gray-200 dark:border-white/10 rounded-[2.5rem] shadow-2xl shadow-black/5 overflow-hidden transition-all">
    <table class="w-full text-left text-sm border-collapse">
        <thead
            class="bg-gray-50/50 dark:bg-white/[0.02] text-gray-400 text-[10px] font-black uppercase tracking-[0.2em] border-b border-gray-200 dark:border-white/10">
            <tr>
                <th class="px-8 py-6">Ref</th>
                <th class="px-8 py-6">Initiator</th>
                <th class="px-8 py-6 w-1/3">Subject</th>
                <th class="px-8 py-6">Files</th>
                <th class="px-8 py-6 text-center">Status</th>
                <th class="px-8 py-6 text-right">Actions</th>
            </tr>
        </thead>
        <tbody id="table-container" class="divide-y divide-gray-100 dark:divide-white/[0.05]">
            {% include "table_body.html" %}
        </tbody>
    </table>
</div>
{% endblock %}
