{% extends "base.html" %}
{% block content %}
<div
    class="max-w-md mx-auto mt-24 bg-white dark:bg-akashi-dark border border-gray-200 dark:border-white/10 p-12 rounded-[3rem] shadow-2xl animate-fade">
    <div class="flex flex-col items-center mb-12">
        <div
            class="w-14 h-14 bg-akashi-red rounded-2xl flex items-center justify-center mb-8 shadow-xl shadow-akashi-red/40 rotate-12">
            <div class="w-3 h-3 bg-white rounded-full"></div>
        </div>
        <h2 class="text-2xl font-black uppercase tracking-[0.3em] dark:text-white">Access Portal</h2>
        <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-3 font-bold">OTP из бота</p>
    </div>

    {% if error %}
    <div class="bg-red-50 dark:bg-red-500/10 border border-red-100 dark:border-red-500/20 p-4 rounded-2xl mb-8">
        <p class="text-akashi-red text-[10px] text-center uppercase font-black tracking-widest">{{ error }}</p>
    </div>
    {% endif %}

    <form action="/login" method="post" class="flex flex-col gap-8">
        <div class="space-y-3">
            <label class="text-[10px] text-gray-400 uppercase font-black tracking-widest ml-2">Telegram ID</label>
            <input type="text" name="tg_id" inputmode="numeric" pattern="[0-9]*" placeholder="Из сообщения /web" required
                class="w-full bg-gray-50 dark:bg-black border border-gray-200 dark:border-white/10 rounded-2xl px-6 py-4 text-sm focus:ring-4 ring-akashi-red/10 outline-none transition-all dark:text-white font-mono tracking-widest">
        </div>

        <div class="space-y-3">
            <label class="text-[10px] text-gray-400 uppercase font-black tracking-widest ml-2">Код / пароль</label>
            <input type="password" name="code" placeholder="••••••" required
                class="w-full bg-gray-50 dark:bg-black border border-gray-200 dark:border-white/10 rounded-2xl px-6 py-4 text-sm focus:ring-4 ring-akashi-red/10 outline-none transition-all dark:text-white font-mono tracking-[0.5em] text-center">
            <p class="text-[9px] text-gray-400 text-center font-bold mt-4 tracking-tight">
                Команда <span class="text-akashi-red">/web</span> в боте — там же показан ваш ID и одноразовый код.
            </p>
        </div>

        <button type="submit"
            class="bg-akashi-red hover:bg-red-600 text-white font-black py-5 rounded-2xl uppercase tracking-[0.3em] transition-all text-xs shadow-xl shadow-akashi-red/30 active:scale-95">
            Authenticate
        </button>
    </form>
</div>
{% endblock %}
