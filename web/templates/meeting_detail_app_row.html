<tr id="meeting-row-{{ app.id }}"
    class="hover:bg-[#FDFAF7] dark:hover:bg-[#181818] transition-colors group border-b border-[#F0EBE3] dark:border-[#1E1E1E] last:border-0">
    <td class="px-5 py-4 w-12 text-[9px] font-mono text-[#b0a8a0]">#{{ app.id }}</td>
    <td class="px-5 py-4">
        <a href="/applications/{{ app.id }}"
            class="block font-bold text-sm text-[#111111] dark:text-[#EDE8DF] hover:text-ak-red dark:hover:text-ak-red-d transition-colors leading-snug">
            {{ app.topic }}
        </a>
        <p class="text-[8px] font-mono text-[#a09890] mt-1.5 uppercase tracking-wide">
            {{ app.display_name }}{% if app.position %} · {{ app.position }}{% endif %}
        </p>
    </td>
    <td class="px-5 py-4 w-32 text-right whitespace-nowrap">
        <span class="s-badge s-{{ app.status }} block mb-2">{{ app.status }}</span>
        <a href="/download/{{ app.id }}" target="_blank"
            class="inline-block text-[8px] font-mono font-bold tracking-widest uppercase text-ak-red dark:text-ak-red-d hover:underline">📄
            PDF</a>
        <form method="post" action="/meetings/{{ meeting.id }}/remove_app/{{ app.id }}"
            onsubmit="return confirmRemoveFromMeeting({{ app.id }})" class="mt-2">
            <button type="submit"
                class="text-[8px] font-mono tracking-widest text-[#b0a8a0] hover:text-ak-red transition-colors"
                data-i18n="meeting.remove">
                ✕ убрать
            </button>
        </form>
    </td>
</tr>
