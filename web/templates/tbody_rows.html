{% for app in apps %}
{% include "row.html" %}
{% endfor %}
{% if not apps %}
<tr>
    <td colspan="{{ 8 if meeting_basket else 7 }}" class="px-6 py-16 text-center border-b border-gray-50 dark:border-white/5">
        <div class="flex flex-col items-center justify-center">
            <div class="w-14 h-14 bg-gray-100 dark:bg-white/5 rounded-2xl flex items-center justify-center text-2xl mb-4">📭</div>
            <p class="font-black text-base dark:text-white">Nothing here</p>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-2 font-bold">
                {% if status_filter %}Нет заявок по выбранному фильтру
                {% elif tab == 'active' %}Нет активных заявок
                {% else %}Архив пуст{% endif %}
            </p>
        </div>
    </td>
</tr>
{% endif %}
