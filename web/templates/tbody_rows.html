{% for app in apps %}
{% include "row.html" %}
{% endfor %}
{% if not apps %}
<tr>
    <td colspan="{{ 8 if meeting_basket else 7 }}" class="px-5 py-16 text-center border-b border-[#F0EBE3] dark:border-[#1E1E1E]">
        <div class="flex flex-col items-center justify-center">
            <div class="text-3xl mb-4 opacity-50">📭</div>
            <p class="font-bold text-[#111111] dark:text-[#EDE8DF] text-sm">Nothing here</p>
            <p class="text-[9px] font-mono text-[#a09890] uppercase tracking-wide mt-2">
                {% if status_filter %}Нет заявок с этим статусом
                {% else %}Заявок пока нет{% endif %}
            </p>
        </div>
    </td>
</tr>
{% endif %}
