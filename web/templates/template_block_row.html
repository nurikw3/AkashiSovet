<div class="template-block-row js-template-block border border-[#DDD8CE] dark:border-[#242424] rounded bg-white dark:bg-[#141414] p-5 mb-3 group">
    <input type="hidden" name="block_id" value="{{ block.id }}" class="js-block-id-input" autocomplete="off" />

    <div class="flex justify-between items-start gap-4 mb-4">
        <div class="flex items-start gap-3 min-w-0">
            <!-- Drag Handle -->
            <span class="js-drag-handle shrink-0 inline-flex flex-col justify-center gap-[3px] py-2 px-1 text-[#b0a8a0] hover:text-ak-red cursor-grab active:cursor-grabbing select-none touch-none mt-0.5" title="Удерживайте и тяните">
                <span class="h-px w-4 bg-current"></span>
                <span class="h-px w-4 bg-current"></span>
                <span class="h-px w-4 bg-current"></span>
            </span>
            <div class="min-w-0">
                <span class="text-[8px] font-mono font-bold tracking-[.15em] uppercase text-[#a09890] block mb-1">Блок</span>
                <p class="text-[10px] font-mono text-[#706860] dark:text-[#a09890]">
                    ID <span class="js-block-id-label font-bold text-[#111111] dark:text-[#EDE8DF]">{{ block.id }}</span>
                </p>
            </div>
        </div>
        <button type="button"
                class="ak-btn-ghost border-ak-red/30 text-ak-red py-1 px-3"
                hx-delete="/settings/template/ui-row"
                hx-target="closest .template-block-row"
                hx-swap="outerHTML swap:200ms">
            Удалить
        </button>
    </div>

    <div class="space-y-4">
        <div>
            <label class="block text-[8px] font-mono font-bold tracking-[.15em] uppercase text-[#a09890] mb-1.5">Заголовок (title)</label>
            <input type="text" name="block_title" required value="{{ block.title }}" class="ak-input" />
        </div>
        <div>
            <label class="block text-[8px] font-mono font-bold tracking-[.15em] uppercase text-[#a09890] mb-1.5">Вопрос (question)</label>
            <textarea name="block_question" rows="3" required class="ak-input resize-y">{{ block.question }}</textarea>
        </div>
        <div>
            <label class="block text-[8px] font-mono font-bold tracking-[.15em] uppercase text-[#a09890] mb-1.5">Описание для LLM (опционально)</label>
            <textarea name="block_desc" rows="2" class="ak-input resize-y" placeholder="Контекст для модели…">{{ block.description_for_llm or '' }}</textarea>
        </div>
        <div class="flex items-start gap-3 pt-1">
            <input type="hidden"
                   name="block_numbered_list"
                   value="{{ '1' if block.format_as_numbered_list | default(false) else '0' }}"
                   class="js-numbered-list-hidden" />
            <input type="checkbox"
                   class="js-numbered-list-cb mt-0.5 accent-[#C93528]"
                   {% if block.format_as_numbered_list | default(false) %}checked{% endif %} />
            <div>
                <span class="block text-[10px] font-mono text-[#111111] dark:text-[#EDE8DF] select-none">
                    Нумерованный список
                </span>
                <p class="text-[9px] font-mono text-[#a09890] mt-1 leading-relaxed">
                    Если инициатор перечисляет несколько пунктов — LLM оформит их списком (1) 2) …), а не сплошным абзацем.
                </p>
            </div>
        </div>
    </div>
</div>
