{% extends "base.html" %}
{% block content %}
<style>
    .sortable-ghost { opacity: 0.4 !important; background: rgba(201, 53, 40, 0.05) !important; }
    .sortable-chosen { box-shadow: inset 2px 0 0 0 #C93528; }
</style>

<div class="max-w-4xl mx-auto anim-fade pb-12">
    <a href="/settings" class="text-[8px] font-mono tracking-widest uppercase text-[#a09890] hover:text-ak-red transition-colors mb-6 inline-block" data-i18n="app.back">← Назад</a>

    <div class="flex items-center gap-4 mb-4">
        <h1 class="text-2xl font-bold tracking-tight text-[#111111] dark:text-[#EDE8DF]" data-i18n="nav.template">Шаблон заявки</h1>
        <div class="h-px flex-1 bg-[#DDD8CE] dark:bg-[#242424]"></div>
    </div>

    <p class="text-[10px] font-mono text-[#a09890] mb-8 leading-relaxed max-w-xl uppercase tracking-wide">
        Порядок карточек = порядок шагов.<br>
        ID правятся кнопкой «Пронумеровать» (влияет на старые заявки!).
    </p>

    <form id="template-form" hx-post="/settings/template/save" hx-target="#save-status" class="space-y-4">
        <div id="block-rows" class="space-y-3">
            {% for block in blocks %}
                {% include "template_block_row.html" %}
            {% endfor %}
        </div>

        <div class="flex flex-wrap items-center gap-3 pt-6 border-t border-[#DDD8CE] dark:border-[#242424]">
            <button type="button" id="template-add-row" class="ak-btn-ghost bg-white dark:bg-[#1A1A1A]">
                Добавить блок
            </button>
            <button type="submit" class="ak-btn-red" id="template-save-btn">
                Сохранить шаблон
            </button>
        </div>

        <div id="save-status" class="text-[9px] font-mono tracking-wide uppercase mt-2 h-4 transition-opacity duration-300"></div>
    </form>
</div>

<script src="/static/vendor/sortable.min.js"></script>
<script>
    (function () {
        var sortableInstance = null;
        function initBlockRowsSortable() {
            var el = document.getElementById('block-rows');
            if (!el || typeof Sortable === 'undefined') return;
            if (sortableInstance) sortableInstance.destroy();
            sortableInstance = Sortable.create(el, {
                animation: 200, easing: 'cubic-bezier(0.2, 0, 0, 1)',
                handle: '.js-drag-handle', draggable: '.template-block-row',
                ghostClass: 'sortable-ghost', chosenClass: 'sortable-chosen',
                forceFallback: true, fallbackOnBody: true,
                swapThreshold: 0.65, invertSwap: true,
            });
        }
        function syncBlockIdLabels() {
            document.querySelectorAll('#block-rows .template-block-row').forEach(function (row) {
                var inp = row.querySelector('.js-block-id-input');
                var lab = row.querySelector('.js-block-id-label');
                if (inp && lab) lab.textContent = inp.value;
            });
        }
        function renumberAllSequential() {
            var rows = document.querySelectorAll('#block-rows .template-block-row');
            if (!rows.length) return;
            rows.forEach(function (row, i) {
                var n = String(i + 1);
                var inp = row.querySelector('.js-block-id-input');
                var lab = row.querySelector('.js-block-id-label');
                if (inp) inp.value = n;
                if (lab) lab.textContent = n;
            });
        }
        function boot() {
            initBlockRowsSortable();
            syncBlockIdLabels();
        }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
        else boot();

        document.body.addEventListener('htmx:beforeRequest', function (evt) {
            if (evt.detail.target && evt.detail.target.id === 'save-status') {
                renumberAllSequential();
            }
        });

        document.body.addEventListener('htmx:afterSwap', function (evt) {
            if (evt.detail.target && evt.detail.target.id === 'block-rows') {
                requestAnimationFrame(function () { initBlockRowsSortable(); syncBlockIdLabels(); });
            }
            if (evt.detail.target && evt.detail.target.id === 'save-status') {
                var el = document.getElementById('save-status');
                el.style.opacity = '1';
                setTimeout(function() {
                    el.style.opacity = '0';
                    setTimeout(function() { el.innerHTML = ''; el.style.opacity = '1'; }, 300);
                }, 3000);
            }
        });
        document.body.addEventListener('htmx:afterRequest', function (evt) {
            if (!evt.detail.successful) return;
            var url = evt.detail.xhr?.responseURL || '';
            if (url.includes('/settings/template/new-row') || url.includes('/settings/template/ui-row')) {
                requestAnimationFrame(function () { initBlockRowsSortable(); syncBlockIdLabels(); });
            }
        });

        var addBtn = document.getElementById('template-add-row');
        if (addBtn) addBtn.addEventListener('click', function () {
            var max = 0;
            document.querySelectorAll('#block-rows .js-block-id-input').forEach(el => {
                var v = parseInt(el.value, 10);
                if (!isNaN(v) && v > max) max = v;
            });
            htmx.ajax('GET', '/settings/template/new-row?next_id=' + (max + 1), { target: '#block-rows', swap: 'beforeend' });
        });
    })();
</script>
{% endblock %}
