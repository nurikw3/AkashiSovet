{% extends "base.html" %}
{% block content %}

<div class="max-w-xl mx-auto animate-fade">
    <p class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-6">
        <a href="/settings" class="hover:text-akashi-red transition-colors">← Settings</a>
    </p>

    <div class="rounded-2xl border border-akashi-red/25 bg-akashi-red/5 dark:bg-akashi-red/10 px-6 py-8">
        <p class="text-[9px] font-black uppercase tracking-widest text-akashi-red mb-2">Шаблон недоступен</p>
        <p class="text-sm text-gray-700 dark:text-gray-300 leading-relaxed">{{ message }}</p>
    </div>

    <p class="mt-8 text-[10px] text-gray-400 uppercase tracking-widest">
        Проверьте запись <code class="font-mono text-xs bg-gray-100 dark:bg-white/10 px-1 rounded">settings.app_template</code> в БД и Redis.
    </p>
</div>

{% endblock %}
