{% extends "base.html" %}
{% block content %}

<div class="max-w-xl mx-auto anim-fade pb-12">
    <p class="text-[8px] font-mono tracking-widest uppercase text-[#a09890] mb-8">
        <a href="/settings" class="hover:text-ak-red transition-colors">← Назад</a>
    </p>

    <div class="border border-ak-red/30 bg-ak-red/5 p-7 rounded">
        <p class="text-[8px] font-mono font-bold tracking-[.15em] uppercase text-ak-red mb-3">Ошибка шаблона</p>
        <p class="text-sm text-ak-red dark:text-ak-red-d leading-relaxed">{{ message }}</p>
    </div>

    <p class="mt-6 text-[9px] font-mono text-[#706860] dark:text-[#a09890] uppercase tracking-wide leading-relaxed">
        Проверьте запись <code class="bg-[#F7F4EF] dark:bg-[#1A1A1A] px-1 py-0.5 rounded border border-[#DDD8CE] dark:border-[#303030]">settings.app_template</code> в БД и Redis.
    </p>
</div>

{% endblock %}
